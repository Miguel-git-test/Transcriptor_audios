<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Reuniones Offline | Cero Datos</title>
  <meta name="description" content="Transcriptor de reuniones privado y local que funciona sin conexión.">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <header class="glass-header">
      <div class="header-content">
        <h1>PrivateMeet</h1>
        <div class="header-badges">
          <span class="badge">100% Offline</span>
          <span id="version-badge" class="badge-version" style="background: #ef4444; color: white;">v3.3</span>
        </div>
      </div>
    </header>

    <main class="content-area">
      <div id="status-panel" class="status-panel">
        <p id="system-status">Iniciando IA local...</p>
        <div class="progress-container" id="progress-container" style="display: none;">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>

      <div id="transcription-container" class="transcription-container">
        <div class="empty-state">
           <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-mic-off"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"></path><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
           <p>Pulsa Grabar para empezar. Todo el procesamiento se hace en tu dispositivo.</p>
        </div>
      </div>

      <div id="summary-panel" class="summary-panel" style="display: none;">
        <h3>Resumen de la Reunión</h3>
        <p id="summary-content">Generando resumen...</p>
      </div>
    </main>

    <footer class="bottom-controls">
      <button id="record-btn" class="btn-record pulse-idle" disabled>
        <span class="icon-mic"></span>
        <span id="record-text">Grabar</span>
      </button>
      <button id="summarize-btn" class="btn-summarize" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        Resumir
      </button>
    </footer>
  </div>

  <!-- Cargar Modules -->
  <script type="module" src="js/app.js"></script>
  
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('SW ok'))
          .catch(err => console.log('SW error', err));
      });
    }
  </script>
</body>
</html>
